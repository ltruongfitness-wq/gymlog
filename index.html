<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>GymLog</title>
<style>
  :root {
    --bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
    --text:#f0f0f0;--text2:#888;--text3:#555;
    --accent:#e8ff47;--accent2:rgba(232,255,71,0.15);--accent3:rgba(232,255,71,0.08);
    --danger:#ff5252;--danger2:rgba(255,82,82,0.12);
    --success:#52ff8a;--success2:rgba(82,255,138,0.12);
    --info:#52b8ff;--info2:rgba(82,184,255,0.12);
    --warn:#ffb347;--warn2:rgba(255,179,71,0.12);
    --radius:12px;--radius-sm:8px;
    --font:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;}
  #app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;padding-top:max(16px,env(safe-area-inset-top));}
  .topbar-title{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
  .topbar-title span{color:var(--accent);}
  .auth-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--font);}
  .scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 16px 20px;}
  .bottom-nav{display:flex;background:var(--bg2);border-top:0.5px solid var(--border);padding-bottom:max(12px,env(safe-area-inset-bottom));flex-shrink:0;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 4px;cursor:pointer;color:var(--text3);border:none;background:none;font-family:var(--font);}
  .nav-item.active{color:var(--accent);}
  .nav-item i{font-size:22px;}
  .nav-item span{font-size:10px;font-weight:500;}
  .card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .card-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
  .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .metric{background:var(--bg3);border-radius:var(--radius-sm);padding:14px;}
  .metric-val{font-size:26px;font-weight:700;letter-spacing:-1px;}
  .metric-val.accent{color:var(--accent);}
  .metric-lbl{font-size:11px;color:var(--text2);margin-top:2px;}
  .search-wrap{position:relative;margin-bottom:12px;}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none;}
  .search-input{width:100%;padding:12px 12px 12px 38px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;outline:none;font-family:var(--font);}
  .search-input:focus{border-color:var(--accent);}
  .search-input::placeholder{color:var(--text3);}
  .dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);max-height:280px;overflow-y:auto;z-index:100;}
  .dd-item{padding:12px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;}
  .dd-item:last-child{border-bottom:none;}
  .dd-item:active{background:var(--bg4);}
  .dd-name{font-size:14px;font-weight:500;}
  .dd-muscles{font-size:11px;color:var(--text2);margin-top:2px;}
  .form-group{margin-bottom:12px;}
  .form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px;}
  input[type="text"],input[type="number"],input[type="date"],select,textarea{width:100%;padding:11px 13px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;outline:none;font-family:var(--font);-webkit-appearance:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}
  textarea{resize:none;min-height:64px;}
  .sets-container{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
  .set-row{display:flex;align-items:center;gap:8px;}
  .set-num{font-size:12px;color:var(--text3);width:36px;flex-shrink:0;font-weight:600;}
  .set-del{width:34px;height:34px;background:var(--danger2);border:none;border-radius:8px;color:var(--danger);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:11px 18px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);}
  .btn:active{opacity:0.7;}
  .btn-primary{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:700;}
  .btn-danger{background:var(--danger2);color:var(--danger);border-color:transparent;}
  .btn-sm{padding:7px 12px;font-size:12px;}
  .btn-full{width:100%;justify-content:center;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
  .prev-session{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;}
  .prev-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
  .prev-data{font-size:14px;font-weight:500;}
  .prev-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--warn2);color:var(--warn);margin-left:6px;}
  .timer-wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .timer-display{font-size:36px;font-weight:700;letter-spacing:-2px;font-variant-numeric:tabular-nums;min-width:90px;color:var(--text2);}
  .timer-display.running{color:var(--success);}
  .timer-display.done{color:var(--danger);}
  .timer-presets{display:flex;gap:6px;flex-wrap:wrap;}
  .timer-preset{padding:8px 14px;background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);}
  .timer-stop{padding:8px 12px;background:var(--danger2);border:none;border-radius:20px;color:var(--danger);font-size:13px;cursor:pointer;font-family:var(--font);}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
  .tag{font-size:11px;padding:3px 8px;border-radius:5px;background:var(--info2);color:var(--info);font-weight:500;}
  .hist-table{width:100%;border-collapse:collapse;}
  .hist-table th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:6px 8px;border-bottom:0.5px solid var(--border);text-align:left;}
  .hist-table td{padding:10px 8px;border-bottom:0.5px solid var(--border);font-size:13px;vertical-align:top;}
  .hist-table tr:last-child td{border-bottom:none;}
  .hist-table tr.latest td{background:var(--accent3);}
  .date-sub{font-size:10px;color:var(--text3);margin-top:2px;}
  .best-tag{font-size:10px;padding:1px 5px;border-radius:3px;background:var(--warn2);color:var(--warn);}
  .note-row{font-size:11px;color:var(--text3);font-style:italic;padding:2px 8px 8px;}
  .muscle-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .muscle-lbl{font-size:12px;color:var(--text2);width:150px;flex-shrink:0;}
  .muscle-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
  .muscle-fill{height:100%;border-radius:3px;background:var(--accent);}
  .muscle-fill.low{background:var(--warn);}
  .muscle-fill.vlow{background:var(--danger);}
  .muscle-val{font-size:11px;color:var(--text3);min-width:40px;text-align:right;}
  .freq-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0;}
  .workout-item{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;border:0.5px solid var(--border);}
  .workout-item:active{opacity:0.7;}
  .workout-date{font-size:14px;font-weight:600;}
  .workout-meta{font-size:12px;color:var(--text2);margin-top:3px;}
  .workout-vol{font-size:14px;font-weight:600;color:var(--accent);}
  .end-bar{background:var(--bg2);border-top:0.5px solid var(--border);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));flex-shrink:0;display:none;}
  .end-bar.visible{display:block;}
  .session-sum{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;gap:12px;}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .toast.success{border-color:var(--success);color:var(--success);}
  .toast.error{border-color:var(--danger);color:var(--danger);}
  .empty{text-align:center;padding:40px 20px;color:var(--text3);}
  .empty i{font-size:44px;display:block;margin-bottom:10px;}
  .empty p{font-size:14px;}
  .sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .sec-title{font-size:18px;font-weight:700;letter-spacing:-0.3px;}
  .vol-filter{display:flex;gap:6px;margin-bottom:16px;}
  .vol-btn{padding:6px 14px;border-radius:20px;border:0.5px solid var(--border);background:none;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);}
  .vol-btn.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent);}
  .divider{height:0.5px;background:var(--border);margin:16px 0;}
  .detail-ex{padding:12px 0;border-bottom:0.5px solid var(--border);}
  .detail-ex:last-child{border-bottom:none;}
  .detail-ex-name{font-size:14px;font-weight:600;margin-bottom:4px;}
  .detail-sets-str{font-size:12px;color:var(--text2);}
  .muscle-check-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .muscle-check{padding:6px 10px;border:0.5px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);}
  .muscle-check.selected{background:var(--info2);color:var(--info);border-color:var(--info);}
  .prog-wrap{position:relative;height:180px;margin-top:12px;}
  .import-textarea{width:100%;min-height:160px;font-size:12px;font-family:monospace;padding:12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);resize:vertical;}
  .import-hint{font-size:12px;color:var(--text3);line-height:1.6;padding:10px 12px;background:var(--bg3);border-radius:var(--radius-sm);margin-top:8px;}
  .import-result{font-size:13px;padding:10px 12px;border-radius:var(--radius-sm);margin-top:8px;}
  .import-result.success{background:var(--success2);color:var(--success);}
  .import-result.error{background:var(--danger2);color:var(--danger);}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-top-color:#0a0a0a;border-radius:50%;animation:spin 0.6s linear infinite;}
</style>

<script>
const CLIENT_ID='30062274250-7qlbmv8sgjgq202mbhq97ctvnppqa6re.apps.googleusercontent.com';

const SCOPES='https://www.googleapis.com/auth/spreadsheets';

const MUSCLES=['Latissimus dorsi','Rhomboids','Mid/lower trapezius','Upper trapezius','Rear deltoid','Lateral deltoid','Anterior deltoid','Pectoralis major (upper)','Pectoralis major (mid/lower)','Biceps brachii','Brachialis','Triceps brachii','Quadriceps','Hamstrings','Glutes','Calves','Erector spinae','Abs/core','Hip abductors','Hip adductors'];

const MUSCLE_MAP={

  'lateral raise':['Lateral deltoid'],
  'bicep curl':['Biceps brachii','Brachialis'],

  'bulgarian':['Quadriceps','Glutes','Hamstrings'],

  'hip adduction':['Hip adductors'],
  'hip abduction':['Hip abductors'],
  'calf raise':['Calves'],
  'standing calf':['Calves'],
  'seated calf':['Calves'],
  'cable crunch':['Abs/core'],
  'ab crunch':['Abs/core'],
  'leg raise':['Abs/core'],
  'hanging knee':['Abs/core'],
  'v up':['Abs/core'],
  'pullover':['Latissimus dorsi','Pectoralis major (mid/lower)'],
};

// ── STATE ─────────────────────────────────────────────────────────
let DB={workouts:[],exercises:{},version:3};
let SESSION={exercises:[],date:todayStr()};
let tokenClient=null,accessToken=null,isSignedIn=false;
let TAB='log';
let logEx='',logExNorm='',logExMuscles=[];
let logSets=[{w:'',r:''},{w:'',r:''},{w:'',r:''}];
let lookupNorm=null,lookupQuery='';
let volPeriod='week';
let histSelected=null;
let timerInterval=null,timerSecs=0,timerRunning=false;
let progNorm=null,progChart=null;
let tagQueue=[],tagIdx=0,tagMuscles=[];

// ── UTILS ─────────────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function daysAgo(d){const n=Math.floor((new Date()-new Date(d))/86400000);return n===0?'today':n===1?'yesterday':n+'d ago';}

function loadDB(){
  try{const r=localStorage.getItem('gymlog_v3');if(r)DB=JSON.parse(r);}catch(e){}
  try{const s=localStorage.getItem('gymlog_sess');if(s)SESSION=JSON.parse(s);}catch(e){}
}
function saveDB(){try{localStorage.setItem('gymlog_v3',JSON.stringify(DB));}catch(e){}}
function saveSess(){try{localStorage.setItem('gymlog_sess',JSON.stringify(SESSION));}catch(e){}}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(()=>t.className='toast',3000);
}

function guessMusclles(name){
  const l=name.toLowerCase();
  for(const[k,v]of Object.entries(MUSCLE_MAP))if(l.includes(k))return v;
  return[];
}

function normName(raw){
  return raw.toLowerCase()
    .replace(/\b(life fitness|hammer strength|nxt|smith machine|barbell|bb|dumbbell|cable|plate loaded|plate|machine|seated|standing|lying|incline|decline|flat|low|high|tall|fixed|assisted|eccentric|paused|pause|weighted|close grip|wide grip|neutral grip|reverse grip|single arm|sa|with grips|with grip|dr mike way|dr mike|curvy bar|straight bar|ez bar|orange handles)\b/g,'')
    .replace(/\s+/g,' ').trim();
}

function getOrCreate(name){
  const norm=normName(name);
  if(!DB.exercises[norm]){
    DB.exercises[norm]={displayName:name.trim(),muscles:guessMusclles(name),aliases:[name.trim()]};
  } else {
    if(!DB.exercises[norm].aliases)DB.exercises[norm].aliases=[];
    const t=name.trim();
    if(!DB.exercises[norm].aliases.includes(t))DB.exercises[norm].aliases.push(t);
  }
  return norm;
}

function searchEx(q){
  if(!q||q.length<1)return[];
  const ql=q.toLowerCase();
  return Object.entries(DB.exercises)
    .map(([k,v])=>({norm:k,...v}))
    .filter(e=>(e.displayName||'').toLowerCase().includes(ql)||k.includes(ql)||(e.aliases||[]).some(a=>a.toLowerCase().includes(ql)))
    .sort((a,b)=>(a.displayName||'').localeCompare(b.displayName||''))
    .slice(0,10);
}

function getHistory(norm){
  const out=[];
  for(const w of DB.workouts){
    for(const e of w.exercises){
      if(e.norm===norm)out.push({date:w.date,sets:e.sets,rpe:e.rpe,notes:e.notes});
    }
  }
  return out.sort((a,b)=>b.date.localeCompare(a.date));
}

function calcVol(sets){
  if(!sets||!sets.length)return 0;
  return Math.round(sets.reduce((a,s)=>{
    const w=parseFloat(s.w||s.weight)||0,r=parseFloat((s.r||s.reps||'').toString().split('+')[0])||0,m=s.perSide?1:1;
    return a+w*r*m;
  },0));
}

function getMuscleVol(period){
  const now=new Date();let cutoff=new Date();
  if(period==='week')cutoff.setDate(now.getDate()-7);
  else if(period==='month')cutoff.setDate(now.getDate()-30);
  else cutoff=new Date('2000-01-01');
  const vol={},sets={};
  MUSCLES.forEach(m=>{vol[m]=0;sets[m]=0;});
  for(const w of DB.workouts){
    if(new Date(w.date)<cutoff)continue;
    for(const e of w.exercises){
      const ex=DB.exercises[e.norm];if(!ex)continue;
      const v=calcVol(e.sets),n=(e.sets||[]).length;
      for(const m of(ex.muscles||[])){vol[m]=(vol[m]||0)+v;sets[m]=(sets[m]||0)+n;}
    }
  }
  return{vol,sets};
}

function lastTrainedDays(muscle){
  let latest=null;
  for(const w of DB.workouts){
    for(const e of w.exercises){
      const ex=DB.exercises[e.norm];
      if(ex&&(ex.muscles||[]).includes(muscle)){if(!latest||w.date>latest)latest=w.date;}
    }
  }
  if(!latest)return null;
  return Math.floor((new Date()-new Date(latest))/86400000);
}

function totalMoved(period){
  const now=new Date();let cutoff=new Date();
  if(period==='week')cutoff.setDate(now.getDate()-7);
  else if(period==='month')cutoff.setDate(now.getDate()-30);
  else cutoff=new Date('2000-01-01');
  let t=0;
  for(const w of DB.workouts){
    if(new Date(w.date)<cutoff)continue;
    for(const e of w.exercises)t+=calcVol(e.sets);
  }
  if(t>=1000000)return(t/1000000).toFixed(1)+'M';
  if(t>=1000)return Math.round(t/1000)+'k';
  return t.toString();
}

// ── GOOGLE AUTH ───────────────────────────────────────────────────
function initAuth(){
  const s=document.createElement('script');
  s.src='https://accounts.google.com/gsi/client';
  s.onload=()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,
      callback:(resp)=>{
        if(resp.error){showToast('Sign in failed','error');return;}
        accessToken=resp.access_token;isSignedIn=true;
        localStorage.setItem('gl_token',accessToken);
        renderAuth();showToast('Signed in!','success');render();
      }
    });
    const saved=localStorage.getItem('gl_token');
    if(saved){accessToken=saved;isSignedIn=true;}
    renderAuth();
  };
  document.head.appendChild(s);
}

function renderAuth(){
  const el=document.getElementById('auth-status');
  if(!el)return;
  if(isSignedIn){
    el.innerHTML=`<button class="auth-btn" onclick="signOut()"><i class="ti ti-check" style="color:var(--success)"></i> Synced</button>`;
  } else {
    el.innerHTML=`<button class="auth-btn" onclick="signIn()"><i class="ti ti-brand-google"></i> Sign in</button>`;
  }
}

function signIn(){if(tokenClient)tokenClient.requestAccessToken();else showToast('Loading...');}
function signOut(){accessToken=null;isSignedIn=false;localStorage.removeItem('gl_token');renderAuth();showToast('Signed out');}

async function syncRows(rows){
  if(!isSignedIn||!accessToken){showToast('Sign in first','error');return false;}
  try{
    const resp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Workouts:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,{
      method:'POST',
      headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},
      body:JSON.stringify({values:rows})
    });
    if(!resp.ok){
      if(resp.status===401){accessToken=null;isSignedIn=false;localStorage.removeItem('gl_token');renderAuth();showToast('Session expired','error');return false;}
      throw new Error('HTTP '+resp.status);
    }
    return true;
  }catch(e){showToast('Sync failed: '+e.message,'error');return false;}
}

async function ensureHeaders(){
  if(!isSignedIn)return;
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Workouts!A1`,{headers:{'Authorization':'Bearer '+accessToken}});
    const d=await r.json();
    if(!d.values||!d.values[0]||d.values[0][0]!=='Date'){
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Workouts!A1:append?valueInputOption=USER_ENTERED`,{
        method:'POST',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},
        body:JSON.stringify({values:[['Date','Exercise','Muscles','Set1 Wt','Set1 Reps','Set2 Wt','Set2 Reps','Set3 Wt','Set3 Reps','Set4 Wt','Set4 Reps','Set5 Wt','Set5 Reps','RPE','Notes','Volume (lbs)']]})
      });
    }
  }catch(e){}
}

async function endWorkout(){
  if(!SESSION.exercises.length){showToast('No exercises logged');return;}
  if(!isSignedIn){signIn();return;}
  const btn=document.getElementById('end-btn');
  btn.innerHTML='<span class="spinner"></span> Syncing...';btn.disabled=true;
  await ensureHeaders();
  const rows=[];
  for(const e of SESSION.exercises){
    const ex=DB.exercises[e.norm]||{};
    const muscles=(ex.muscles||[]).join(', ');
    const sd=[];
    for(let i=0;i<5;i++){const s=e.sets[i];sd.push(s?s.w||'':'',s?s.r||'':'');}
    rows.push([SESSION.date,ex.displayName||e.norm,muscles,...sd,e.rpe||'',e.notes||'',calcVol(e.sets)]);
  }
  const ok=await syncRows(rows);
  btn.innerHTML='<i class="ti ti-cloud-upload"></i> End workout &amp; sync to Google Sheets';btn.disabled=false;
  if(ok){
    let w=DB.workouts.find(x=>x.date===SESSION.date);
    if(!w){w={date:SESSION.date,exercises:[]};DB.workouts.push(w);}
    for(const e of SESSION.exercises){if(w.exercises.findIndex(x=>x.norm===e.norm)===-1)w.exercises.push(e);}
    saveDB();SESSION={exercises:[],date:todayStr()};saveSess();
    updateEndBar();showToast('Synced to Google Sheets!','success');render();
  }
}

// ── TIMER ─────────────────────────────────────────────────────────
function startTimer(s){
  if(timerInterval)clearInterval(timerInterval);
  timerSecs=s;timerRunning=true;updateTimerEl();
  timerInterval=setInterval(()=>{
    timerSecs--;
    if(timerSecs<=0){timerSecs=0;timerRunning=false;clearInterval(timerInterval);}
    updateTimerEl();
  },1000);
}
function stopTimer(){if(timerInterval)clearInterval(timerInterval);timerRunning=false;timerSecs=0;updateTimerEl();}
function updateTimerEl(){
  const el=document.getElementById('timer-display');if(!el)return;
  const mm=String(Math.floor(timerSecs/60)).padStart(2,'0'),ss=String(timerSecs%60).padStart(2,'0');
  el.textContent=mm+':'+ss;
  el.className='timer-display'+(timerRunning?' running':(timerSecs===0?'':' done'));
}

function updateEndBar(){
  const bar=document.getElementById('end-bar'),sum=document.getElementById('session-sum');
  if(!bar||!sum)return;
  if(SESSION.exercises.length>0){
    bar.className='end-bar visible';
    const vol=SESSION.exercises.reduce((a,e)=>a+calcVol(e.sets),0);
    sum.innerHTML=`<span>${SESSION.exercises.length} exercises</span><span>${vol.toLocaleString()} lbs</span><span>${fmtDate(SESSION.date)}</span>`;
  } else bar.className='end-bar';
}

  const ex=tagQueue[tagIdx];
  const guessed=guessMusclles(ex);
  if(!tagMuscles.length&&guessed.length)tagMuscles=[...guessed];
  return`<div class="card">
    <div class="card-label">Tag muscles (${tagIdx+1} / ${tagQueue.length})</div>
    <div class="sec-title" style="margin-bottom:4px;">${ex}</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;">Which muscles does this exercise target?</div>
    <div class="muscle-check-grid" id="m-checks">
      ${MUSCLES.map(m=>`<div class="muscle-check${tagMuscles.includes(m)?' selected':''}" onclick="toggleTag('${m.replace(/[()]/g,'\\$&')}')">${m}</div>`).join('')}
    </div>
    <div class="divider"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveTag()">Save <i class="ti ti-arrow-right"></i></button>
      <button class="btn" onclick="skipTag()">Skip</button>
    </div>
  </div>`;
}

// ── IMPORT TAB ────────────────────────────────────────────────────
function renderImport(){
  return`<div class="card">
    <div class="sec-title" style="margin-bottom:4px;">Import history</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px;">Copy your workout notes from Apple Notes (Command+A, Command+C on Mac) and paste below. The tab-separated table format is fully supported.</p>
    <textarea class="import-textarea" id="imp-ta" placeholder="Paste workout notes here..."></textarea>
    <div class="import-hint">Your notes use a multi-column table format with dates across the top and exercises below each date. The parser handles this automatically.</div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-primary" onclick="runImport()"><i class="ti ti-upload"></i> Import</button>
      <button class="btn" onclick="doExport()"><i class="ti ti-download"></i> Backup</button>
      <button class="btn btn-danger" onclick="clearAll()"><i class="ti ti-trash"></i> Clear all</button>
    </div>
    <div id="imp-result"></div>
  </div>`;
}

// ── PARSER ────────────────────────────────────────────────────────
const MONTH_MAP={january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11,jan:0,feb:1,mar:2,apr:3,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

function parseOneDate(s){
  if(!s||!s.trim())return null;
  s=s.trim().replace(/\s+/g,' ');
  try{
    const m1=s.match(/^([a-zA-Z]+)\s+(\d{1,2})(?:st|nd|rd|th)?,?\s*(\d{4})/i);
    if(m1&&MONTH_MAP[m1[1].toLowerCase()]!==undefined)
      return new Date(parseInt(m1[3]),MONTH_MAP[m1[1].toLowerCase()],parseInt(m1[2])).toISOString().split('T')[0];
    const m2=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
    if(m2){const yr=m2[3].length===2?'20'+m2[3]:m2[3];return new Date(parseInt(yr),parseInt(m2[1])-1,parseInt(m2[2])).toISOString().split('T')[0];}
    const m3=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m3)return m3[0];
    // handle "May, 25, 2025" style
    const m4=s.match(/^([a-zA-Z]+),?\s*(\d{1,2}),?\s*(\d{4})/i);
    if(m4&&MONTH_MAP[m4[1].toLowerCase()]!==undefined)
      return new Date(parseInt(m4[3]),MONTH_MAP[m4[1].toLowerCase()],parseInt(m4[2])).toISOString().split('T')[0];
  }catch(e){}
  return null;
}

function looksLikeDate(s){
  if(!s||!s.trim())return false;
  const t=s.trim();
  return /^[a-zA-Z]+\s+\d{1,2}/i.test(t)||/^\d{1,2}\/\d{1,2}\/\d/.test(t)||/^\d{4}-\d{2}-\d{2}/.test(t);
}

function parseExerciseCell(cell){
  if(!cell||!cell.trim())return null;
  cell=cell.trim();
  const skipWords=['planet fitness','fitness connect','vacation','hungover','https://','chasee','blue cross','alendronate','executive','arrowood','dad needs','bp looks','echo','refill','west arro','jeff nippard'];
  if(skipWords.some(w=>cell.toLowerCase().startsWith(w)))return null;
  if(cell.length<3)return null;

  const parts=cell.split(',').map(p=>p.trim()).filter(p=>p.length>0);
  if(parts.length<2)return null;

  // find where the name ends and numbers begin
  let nameEnd=0;
  for(let i=0;i<Math.min(parts.length,5);i++){
    const p=parts[i];
    // if this part starts with a digit it's a weight/rep value
    if(/^\d/.test(p)&&!/^[a-zA-Z]/.test(p)){nameEnd=i;break;}
    nameEnd=i+1;
  }
  if(nameEnd===0||nameEnd>5)return null;

  const name=parts.slice(0,nameEnd).join(', ').trim();
  if(name.length<2)return null;

  const rest=parts.slice(nameEnd);
  if(!rest.length)return null;

  // first number after name = weight
  const wm=(rest[0]||'').match(/^(\d+(\.\d+)?)/);
  if(!wm)return null;
  const weight=wm[1];
  const perSide=/each\s*(side|hand|arm)/i.test(rest[0])||/\bsa\b/i.test(cell);

  // remaining numbers = reps (2 or 3 sets)
  const sets=[];
  for(let i=1;i<rest.length&&sets.length<5;i++){
    const p=rest[i].trim();
    if(!p)continue;
    // skip pure text notes
    if(/^[a-zA-Z]/.test(p)&&!/^\d/.test(p))continue;
    // skip things like "life fitness machine"
    if(isNaN(parseFloat(p))&&!/^\d+\+\d+/.test(p))continue;
    const rm=p.match(/^(\d+(?:\+\d+)*)/);
    if(rm)sets.push({w:weight,r:rm[1],perSide});
  }

  if(!sets.length)return null;

  const rpeM=cell.match(/lsrpe\s*([\d.]+)/i);
  const hasDoAgain=/do again/i.test(cell);
  const noteWords=[];
  if(hasDoAgain)noteWords.push('do again');
  if(rpeM)noteWords.push('RPE '+rpeM[1]);

  return{name,sets,rpe:rpeM?rpeM[1]:'',notes:noteWords.join(', ')};
}

function runImport(){
  const ta=document.getElementById('imp-ta');
  if(!ta||!ta.value.trim()){showToast('Paste your notes first');return;}
  const raw=ta.value;

  // split into lines
  const lines=raw.split('\n');

  let totalSessions=0,totalExercises=0,errors=0;
  const untagged=new Set();

  // We process line by line
  // A "date row" is a line where at least one tab-cell looks like a date
  // Rows after a date row until the next date row are exercise rows

  let dateColumns=[]; // array of {colIndex, dateStr}
  let inTable=false;

  for(let li=0;li<lines.length;li++){
    const line=lines[li];
    const cells=line.split('\t').map(c=>c.trim());

    // check if any cell in this line looks like a date
    const dateCells=cells.map((c,i)=>({i,d:parseOneDate(c)})).filter(x=>x.d!==null);

    if(dateCells.length>0){
      // this is a date header row
      dateColumns=dateCells;
      inTable=true;
      // count new sessions
      for(const dc of dateColumns){
        if(!DB.workouts.find(w=>w.date===dc.d)){
          DB.workouts.push({date:dc.d,exercises:[]});
          totalSessions++;
        }
      }
      continue;
    }

    if(!inTable)continue;

    // this is an exercise row — each tab-cell corresponds to a column
    // match cells to date columns by index
    for(const dc of dateColumns){
      const cell=cells[dc.i]||'';
      if(!cell.trim())continue;

      const ex=parseExerciseCell(cell);
      if(!ex)continue;

      const norm=getOrCreate(ex.name);
      if(!(DB.exercises[norm].muscles||[]).length)untagged.add(ex.name);

      let workout=DB.workouts.find(w=>w.date===dc.d);
      if(!workout){workout={date:dc.d,exercises:[]};DB.workouts.push(workout);totalSessions++;}

      // avoid duplicate exercises on same day
      if(workout.exercises.findIndex(e=>e.norm===norm)===-1){
        workout.exercises.push({norm,sets:ex.sets,rpe:ex.rpe,notes:ex.notes});
        totalExercises++;
      }
    }
  }

  saveDB();

  const resultEl=document.getElementById('imp-result');
  if(resultEl){
    resultEl.innerHTML=`<div class="import-result success">Imported ${totalSessions} sessions and ${totalExercises} exercises successfully.</div>`;
  }

  showToast(`Done! ${totalSessions} sessions, ${totalExercises} exercises`,'success');

  const needTag=[...untagged].filter(n=>{
    const norm=getOrCreate(n);
    return!(DB.exercises[norm]?.muscles?.length);
  });

  if(needTag.length>0){tagQueue=needTag;tagIdx=0;tagMuscles=[];render();}
  else{setTimeout(()=>showTab('history'),1500);}
}

// ── EVENT HANDLERS ────────────────────────────────────────────────
function onLogInp(val){
  logEx=val;logExMuscles=val?guessMusclles(val):[];
  const res=searchEx(val);
  const dd=document.getElementById('log-dd');if(!dd)return;
  if(val&&res.length){
    dd.style.display='block';
    dd.innerHTML=res.map(e=>`<div class="dd-item" onclick="selLogEx('${e.norm.replace(/'/g,"\\'")}','${(e.displayName||e.norm).replace(/'/g,"\\'")}')"><div class="dd-name">${e.displayName||e.norm}</div><div class="dd-muscles">${(e.muscles||[]).slice(0,3).join(' · ')}</div></div>`).join('');
  } else dd.style.display='none';
}

function selLogEx(norm,display){
  logEx=display;logExNorm=norm;
  logExMuscles=DB.exercises[norm]?.muscles||guessMusclles(display);
  const dd=document.getElementById('log-dd');if(dd)dd.style.display='none';
  const inp=document.getElementById('log-inp');if(inp)inp.value=display;
  // pre-fill last weights
  const hist=getHistory(norm);
  if(hist.length){hist[0].sets.forEach((s,i)=>{if(logSets[i])logSets[i].w=s.w||s.weight||'';});}
}

function onLookInp(val){
  lookupQuery=val;
  const res=searchEx(val);
  const dd=document.getElementById('look-dd');if(!dd)return;
  if(val&&res.length){dd.style.display='block';dd.innerHTML=res.map(e=>`<div class="dd-item" onclick="selLookup('${e.norm.replace(/'/g,"\\'")}')"><div class="dd-name">${e.displayName||e.norm}</div><div class="dd-muscles">${(e.muscles||[]).slice(0,3).join(' · ')}</div></div>`).join('');}
  else dd.style.display='none';
}

function selLookup(norm){
  lookupNorm=norm;lookupQuery=DB.exercises[norm]?.displayName||norm;
  const dd=document.getElementById('look-dd');if(dd)dd.style.display='none';
  render();
}

function onProgInp(val){
  const res=searchEx(val);
  const dd=document.getElementById('prog-dd');if(!dd)return;
  if(val&&res.length){dd.style.display='block';dd.innerHTML=res.map(e=>`<div class="dd-item" onclick="selProg('${e.norm.replace(/'/g,"\\'")}')"><div class="dd-name">${e.displayName||e.norm}</div></div>`).join('');}
  else dd.style.display='none';
}

function selProg(norm){
  progNorm=norm;
  const dd=document.getElementById('prog-dd');if(dd)dd.style.display='none';
  maybeProgChart();
}

function addSet(){
  logSets.push({w:logSets[logSets.length-1]?.w||'',r:''});
  const c=document.getElementById('sets-cont');if(!c)return;
  const i=logSets.length-1;
  const div=document.createElement('div');div.className='set-row';
  div.innerHTML=`<span class="set-num">Set ${i+1}</span>
    <input type="number" placeholder="Weight" value="${logSets[i].w}" step="2.5" inputmode="decimal" oninput="logSets[${i}].w=this.value">
    <input type="text" placeholder="Reps" value="${logSets[i].r}" oninput="logSets[${i}].r=this.value" style="max-width:90px;">
    <button class="set-del" onclick="rmSet(${i})"><i class="ti ti-x"></i></button>`;
  c.appendChild(div);
}

function rmSet(i){logSets.splice(i,1);render();}

function saveEx(){
  const exName=document.getElementById('log-inp')?.value?.trim();
  if(!exName){showToast('Enter an exercise name');return;}
  const sets=logSets.filter(s=>s.w||s.r).map(s=>({
    w:s.w||'0',r:s.r||'0',
    perSide:exName.toLowerCase().includes('each side')||exName.toLowerCase().includes('each hand')||/\bsa\b/i.test(exName)
  }));
  if(!sets.length){showToast('Enter at least one set');return;}
  const norm=getOrCreate(exName);
  const rpe=document.getElementById('log-rpe')?.value||'';
  const notes=document.getElementById('log-notes')?.value?.trim()||'';
  SESSION.exercises.push({norm,sets,rpe,notes});
  saveSess();saveDB();
  logSets=[{w:'',r:''},{w:'',r:''},{w:'',r:''}];logEx='';logExNorm='';logExMuscles=[];
  showToast('Saved!','success');render();
}

function toggleTag(m){
  if(tagMuscles.includes(m))tagMuscles=tagMuscles.filter(x=>x!==m);else tagMuscles.push(m);
  document.querySelectorAll('.muscle-check').forEach(el=>{
    el.className='muscle-check'+(tagMuscles.includes(el.textContent.trim())?' selected':'');
  });
}

function saveTag(){
  const ex=tagQueue[tagIdx];const norm=getOrCreate(ex);
  DB.exercises[norm].muscles=[...tagMuscles];saveDB();
  tagMuscles=[];tagIdx++;
  if(tagIdx>=tagQueue.length){tagQueue=[];tagIdx=0;showToast('All tagged!','success');showTab('history');}
  else render();
}

function skipTag(){tagMuscles=[];tagIdx++;if(tagIdx>=tagQueue.length){tagQueue=[];tagIdx=0;showTab('history');}else render();}

function delWorkout(date){
  if(!confirm('Delete this workout?'))return;
  DB.workouts=DB.workouts.filter(w=>w.date!==date);saveDB();histSelected=null;render();showToast('Deleted');
}

function doExport(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='gymlog_backup_'+todayStr()+'.json';a.click();
  URL.revokeObjectURL(url);showToast('Backup downloaded!','success');
}

function clearAll(){
  if(!confirm('Delete ALL data? Cannot be undone.'))return;
  DB={workouts:[],exercises:{},version:3};SESSION={exercises:[],date:todayStr()};
  saveDB();saveSess();showToast('Cleared');render();
}

// ── INIT ──────────────────────────────────────────────────────────
loadDB();render();updateEndBar();initAuth();
